<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ROAD RAGE — Racer</title>
  <link rel="stylesheet" href="/src/styles/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <div id="overlay">
    <h1>ROAD RAGE</h1>
    <div class="sub">A SUNSET GRID RACER</div>
    <div class="rules">
      3 laps · 3 rivals · corner-aware AI that fights back.<br>
      <b>Joystick</b> to steer and throttle.<br>
      <b>Hold DRIFT</b> to slide through corners.<br>
      <b>NOS</b> burns your nitro meter for a speed burst.<br>
      Desktop: Arrows/WASD, Shift = drift, Space = nitro.
    </div>
    <button id="startBtn">TAP TO START ENGINE</button>
    <div id="finishStats"></div>
  </div>

  <div id="countdown">3</div>

  <div id="hud" class="hidden">
    <div id="topLeft" class="panel">
      <div id="lapLine">LAP <span id="lapNum">1</span>/3</div>
      <div id="posLineText">1ST</div>
      <div id="timeLine">TIME <span id="timeNum">00:00.0</span></div>
    </div>

    <div id="gaugeWrap">
      <div id="gaugeFace">
        <div id="needle"></div>
        <div id="hub"></div>
        <div id="speedNum">0</div>
        <div id="speedUnit">KM/H</div>
      </div>
    </div>

    <div id="minimapWrap" class="panel">
      <canvas id="minimapCanvas" width="130" height="130"></canvas>
    </div>

    <div id="topRightCluster">
      <div id="nitroWrap" class="panel">
        <div id="nitroLabel">NITRO</div>
        <div id="nitroTrack"><div id="nitroFill"></div></div>
      </div>
    </div>

    <div id="touchControls">
      <!-- Bottom Left: Joystick -->
      <div class="joystick-container" id="joyContainer">
        <div class="joystick-knob" id="joyKnob"></div>
      </div>
      <!-- Bottom Right: Action Buttons -->
      <div class="action-container">
        <div class="btn-action" id="btnDrift" aria-label="Drift">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 12l-4-4"/>
            <path d="M12 12l4 4"/>
          </svg>
        </div>
        <div class="btn-action btn-nitro" id="btnNitro" aria-label="Nitro">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
          </svg>
        </div>
      </div>
    </div>
  </div>

  <!-- Vite replaces this with the hashed bundle at build time -->
  <script type="module" src="/src/main.js"></script>
</body>
</html>
